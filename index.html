<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森哥的古诗绘本馆</title>
<!-- Inter font (Plain Black substitute at weight 500 + neg letter-spacing) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* === Clay Design System Tokens === */
:root {
  --canvas: #fffaf0;
  --surface-soft: #faf5e8;
  --surface-card: #f5f0e0;
  --surface-strong: #ebe6d6;
  --ink: #0a0a0a;
  --body: #3a3a3a;
  --body-strong: #1a1a1a;
  --muted: #6a6a6a;
  --muted-soft: #9a9a9a;
  --hairline: #e5e5e5;
  --hairline-soft: #f0f0f0;
  --brand-pink: #ff4d8b;
  --brand-teal: #1a3a3a;
  --brand-lavender: #b8a4ed;
  --brand-peach: #ffb084;
  --brand-ochre: #e8b94a;
  --brand-mint: #a4d4c5;
  --brand-coral: #ff6b5a;
  --on-primary: #ffffff;
  --on-dark: #ffffff;
  --on-light: #0a0a0a;
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 9999px;
  --space-xs: 8px;
  --space-sm: 12px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-xxl: 48px;
  --space-section: 80px;
  --max-width: 1280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--canvas);
  color: var(--body);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* === Hero === */
.hero {
  padding: var(--space-section) var(--space-lg) var(--space-xxl);
  text-align: center;
  max-width: var(--max-width);
  margin: 0 auto;
}
.hero h1 {
  font-family: "Inter", sans-serif;
  font-size: 56px;
  font-weight: 500;
  letter-spacing: -2px;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: var(--space-md);
}
.hero .lead {
  font-size: 18px;
  font-weight: 400;
  color: var(--muted);
  max-width: 540px;
  margin: 0 auto var(--space-lg);
  line-height: 1.55;
}
.hero .count-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-card);
  color: var(--muted);
  padding: 6px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
}

/* === Gallery Grid === */
.gallery {
  max-width: var(--max-width);
  margin: 0 auto var(--space-section);
  padding: 0 var(--space-lg);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-lg);
}

/* === Poem Cards (Clay feature-card style) === */
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  border-radius: var(--radius-xl);
  padding: var(--space-xl);
  transition: transform 0.2s ease;
  position: relative;
  overflow: hidden;
  min-height: 280px;
  display: flex;
  flex-direction: column;
}
.card:hover { transform: translateY(-4px); }

/* 6-color rotation — anchors Clay's saturated feature-card rhythm */
.card:nth-child(6n+1) { background: var(--brand-pink); color: var(--on-primary); }
.card:nth-child(6n+2) { background: var(--brand-teal); color: var(--on-dark); }
.card:nth-child(6n+3) { background: var(--brand-lavender); color: var(--on-light); }
.card:nth-child(6n+4) { background: var(--brand-peach); color: var(--on-light); }
.card:nth-child(6n+5) { background: var(--brand-ochre); color: var(--on-light); }
.card:nth-child(6n+0) { background: var(--surface-card); color: var(--on-light); border: 1px solid var(--hairline); }

.card-illustration {
  font-size: 52px;
  line-height: 1;
  margin-bottom: var(--space-md);
  opacity: 0.9;
}
.card-title {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.3px;
  margin-bottom: var(--space-xs);
}
.card-author {
  font-size: 13px;
  font-weight: 500;
  opacity: 0.7;
  margin-bottom: var(--space-sm);
}
.card-excerpt {
  font-size: 14px;
  line-height: 1.65;
  opacity: 0.85;
  margin-bottom: var(--space-md);
  flex: 1;
}

/* Tags — cream pill badges on colored cards */
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: auto;
}
.card-tag {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* Light-card tag variant */
.card:nth-child(6n+3) .card-tag,
.card:nth-child(6n+4) .card-tag,
.card:nth-child(6n+5) .card-tag,
.card:nth-child(6n+0) .card-tag {
  background: rgba(0,0,0,0.06);
}

/* === Empty State === */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: var(--space-xxl);
  color: var(--muted-soft);
  font-size: 14px;
}

/* === Footer (Clay: cream footer, NOT dark) === */
.footer {
  background: var(--surface-soft);
  padding: var(--space-section) var(--space-lg);
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}
.footer .divider {
  display: inline-block;
  width: 40px;
  height: 2px;
  background: var(--hairline);
  margin-bottom: var(--space-lg);
  border-radius: 1px;
}

/* === Responsive === */
@media (max-width: 1024px) {
  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
  .hero h1 {
    font-size: 44px;
    letter-spacing: -1.5px;
  }
}
@media (max-width: 768px) {
  .hero {
    padding: var(--space-xxl) var(--space-md) var(--space-xl);
  }
  .hero h1 {
    font-size: 36px;
    letter-spacing: -1px;
  }
  .gallery {
    grid-template-columns: 1fr;
    padding: 0 var(--space-md);
  }
  .card {
    padding: var(--space-lg);
    min-height: 220px;
  }
  .card-illustration { font-size: 42px; }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <h1>森哥的古诗绘本馆</h1>
  <p class="lead">为奥莉和茉莉挑选最美的诗。每一首都是一幅画，点击卡片进入绘本世界。</p>
  <div class="count-badge" id="count">—</div>
</div>

<!-- Gallery -->
<div class="gallery" id="gallery"></div>

<!-- Footer -->
<div class="footer">
  <div class="divider"></div>
  <p>每一首诗，都是一幅画。<br>打开绘本，听见诗的声音。</p>
</div>

<script>
// Load poems from manifest
fetch('poems.json?' + Date.now())
  .then(r => r.json())
  .then(poems => {
    document.getElementById('count').textContent = '共 ' + poems.length + ' 首诗';

    const gallery = document.getElementById('gallery');
    const emojis = ['🌙','🌄','🏔️','🌸','❄️','🎋','🏮','🦅','🐟','🍂','🌊','🕊️','🐉','🎏','🌿','🪷'];

    poems.forEach((poem, i) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = poem.file;
      card.target = '_blank';
      card.title = poem.title + ' — ' + poem.author;

      card.innerHTML =
        '<div class="card-illustration">' + (emojis[i % emojis.length]) + '</div>' +
        '<div class="card-title">' + poem.title + '</div>' +
        '<div class="card-author">' + poem.author + '</div>' +
        '<div class="card-excerpt">' + poem.summary + '</div>' +
        '<div class="card-tags">' +
          poem.tags.map(t => '<span class="card-tag">' + t + '</span>').join('') +
        '</div>';

      gallery.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('gallery').innerHTML =
      '<div class="empty-state">古诗正在赶来…</div>';
  });
</script>

</body>
</html>
