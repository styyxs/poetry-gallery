<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 森哥的古诗绘本馆</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 30%, #d4e8d4 70%, #c8dce8 100%);
  min-height: 100vh;
  color: #3e2723;
}

/* ===== 顶部 ===== */
.hero {
  text-align: center;
  padding: 60px 30px 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 40%, rgba(255,183,77,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, rgba(129,212,250,0.15) 0%, transparent 60%);
  animation: float 15s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(20px, -15px); }
  66% { transform: translate(-15px, 10px); }
}
.hero h1 {
  font-size: 48px;
  position: relative;
  z-index: 1;
  margin-bottom: 12px;
}
.hero .subtitle {
  font-size: 18px;
  color: #8d6e63;
  position: relative;
  z-index: 1;
  margin-bottom: 16px;
}
.hero .poem-count {
  display: inline-block;
  background: #fff;
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 15px;
  color: #6d4c41;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  position: relative;
  z-index: 1;
}

/* ===== 画廊 ===== */
.gallery {
  max-width: 1000px;
  margin: 0 auto 60px;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 30px;
}

/* ===== 卡片 ===== */
.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.15);
}
.card-image {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  position: relative;
  overflow: hidden;
}
.card-image::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(transparent, white);
}

/* 为每张卡配不同背景色 */
.card:nth-child(5n+1) .card-image { background: linear-gradient(135deg, #b8e0ff, #d4f0ff); }
.card:nth-child(5n+2) .card-image { background: linear-gradient(135deg, #ffd6e8, #ffe0f0); }
.card:nth-child(5n+3) .card-image { background: linear-gradient(135deg, #fff3a0, #fff8d0); }
.card:nth-child(5n+4) .card-image { background: linear-gradient(135deg, #c8f0d0, #d8f8e0); }
.card:nth-child(5n+5) .card-image { background: linear-gradient(135deg, #e0d0ff, #ece0ff); }

.card-body {
  padding: 20px 24px 24px;
}
.card-body h2 {
  font-size: 24px;
  margin-bottom: 4px;
}
.card-body .author {
  font-size: 14px;
  color: #8d6e63;
  margin-bottom: 12px;
}
.card-body .summary {
  font-size: 15px;
  color: #5d4037;
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-body .tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tag {
  background: #f5f0eb;
  color: #8d6e63;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 13px;
}

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: #8d6e63;
  font-size: 14px;
}

@media (max-width: 640px) {
  .hero h1 { font-size: 34px; }
  .gallery { grid-template-columns: 1fr; padding: 0 16px; }
  .card-image { height: 160px; font-size: 52px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>森哥的古诗绘本馆</h1>
  <div class="subtitle">为奥莉和茉莉挑选最美的诗</div>
  <div class="poem-count" id="count">共 0 首诗</div>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">🖌️ 每一首诗，都是一幅画。点击卡片，进入绘本世界。</div>

<script>
// 从 poems.json 动态加载古诗列表
fetch('poems.json?' + Date.now())
  .then(r => r.json())
  .then(poems => {
    document.getElementById('count').textContent = '共 ' + poems.length + ' 首诗';
    const gallery = document.getElementById('gallery');
    const emojis = ['🌙','🌄','🏔️','🌸','❄️','🎋','🌾','🦅','🐟','🍂','🏮','🎏'];

    poems.forEach((poem, i) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = poem.file;
      card.target = '_blank';

      card.innerHTML = `
        <div class="card-image">${emojis[i % emojis.length]}</div>
        <div class="card-body">
          <h2>${poem.title}</h2>
          <div class="author">${poem.author}</div>
          <div class="summary">${poem.summary}</div>
          <div class="tags">${poem.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
        </div>
      `;

      gallery.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById('gallery').innerHTML =
      '<p style="text-align:center;grid-column:1/-1;color:#8d6e63;">古诗加载中...</p>';
    console.error('加载失败:', err);
  });
</script>

</body>
</html>
