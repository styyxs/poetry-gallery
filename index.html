<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森哥的古诗绘本馆 · 国风动漫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3e9;
  --paper: #fcf9f2;
  --ink: #2c2416;
  --ink-soft: #5a4e3c;
  --ink-muted: #8a7e6c;
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --red: #c04040;
  --card-w: min(360px, 100%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Serif SC", "PingFang SC", "Hiragino Sans GB", serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 75%, rgba(192,64,64,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(90,138,106,0.04) 0%, transparent 70%);
  color: var(--ink);
  min-height: 100vh;
}

/* ========== Floating clouds ========== */
.clouds { position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden; }
.cloud { position:absolute;opacity:0.10; }
.cloud:nth-child(1){top:8%;left:-10%;font-size:120px;animation:drift 50s linear infinite;}
.cloud:nth-child(2){top:25%;left:60%;font-size:80px;animation:drift 42s linear infinite;animation-delay:-15s;}
.cloud:nth-child(3){top:60%;left:30%;font-size:100px;animation:drift 55s linear infinite;animation-delay:-28s;}
.cloud:nth-child(4){top:80%;left:70%;font-size:70px;animation:drift 38s linear infinite;animation-delay:-8s;}
.cloud:nth-child(5){top:45%;left:85%;font-size:60px;animation:drift 60s linear infinite;animation-delay:-20s;}
@keyframes drift {from{transform:translateX(0)}to{transform:translateX(130vw)}}

.container { position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px; }

/* ========== Hero ========== */
.hero { text-align:center;padding:80px 0 60px; }
.hero h1 {
  font-family:"ZCOOL KuaiLe","Noto Serif SC",cursive;
  font-size:48px;font-weight:400;color:var(--ink);
  letter-spacing:4px;margin-bottom:12px;
  text-shadow:2px 2px 0 var(--gold-light);
}
.hero .subtitle {
  font-size:16px;color:var(--ink-muted);letter-spacing:2px;
}
.hero .deco { display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px; }
.hero .deco span{display:block;width:40px;height:1px;background:var(--gold);opacity:0.5;}
.hero .deco .dia{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);}

.sect-head { text-align:center;padding:16px 0 28px;font-size:14px;color:var(--ink-muted);letter-spacing:6px;display:flex;align-items:center;justify-content:center;gap:14px; }
.sect-head::before,.sect-head::after{content:'';display:block;width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ========== Gallery ========== */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:28px;padding-bottom:80px;
}

/* ========== Card ========== */
.card {
  display:block;text-decoration:none;color:var(--ink);
  background:var(--paper);
  border-radius:4px 20px 4px 20px;
  padding:0 0 28px 0;
  overflow:hidden;
  transition:transform .25s,box-shadow .25s;
  box-shadow:0 2px 14px rgba(44,36,22,.05),0 0 0 1px rgba(201,168,76,.10);
}
.card:hover { transform:translateY(-6px);box-shadow:0 8px 30px rgba(44,36,22,.10); }

/* ——— CSS Illustration Area ——— */
.card-illus {
  height:170px;
  position:relative;
  overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
}

/* Mountain scene (山水/长江) */
.illus-mountain { background:linear-gradient(180deg,#dce8f0 0%,#e8ddd0 60%,#d4c8b8 100%); }
.illus-mountain .peak-l { position:absolute;bottom:0;left:15%;width:0;height:0;border-left:80px solid transparent;border-right:60px solid transparent;border-bottom:130px solid #7a9a7a;opacity:.6; }
.illus-mountain .peak-r { position:absolute;bottom:0;right:10%;width:0;height:0;border-left:70px solid transparent;border-right:50px solid transparent;border-bottom:110px solid #6a8a6a;opacity:.5; }
.illus-mountain .peak-c { position:absolute;bottom:0;left:42%;width:0;height:0;border-left:50px solid transparent;border-right:50px solid transparent;border-bottom:100px solid #8aaa8a;opacity:.55; }
.illus-mountain .mist { position:absolute;bottom:20px;left:0;right:0;height:40px;background:linear-gradient(0deg,rgba(220,230,240,.8),transparent); }
.illus-mountain .boat { position:absolute;bottom:45px;left:55%;font-size:12px;color:#5a6a5a;animation:boatSail 6s ease-in-out infinite; }
@keyframes boatSail { 0%,100%{transform:translateX(0)} 50%{transform:translateX(15px)} }

/* Moon scene (思乡/月亮) */
.illus-moon { background:linear-gradient(180deg,#1a2a4a 0%,#2a3a5a 40%,#3a4a6a 100%); }
.illus-moon .moon { position:absolute;top:20px;right:40px;width:60px;height:60px;background:radial-gradient(circle,#ffe8c0,#ffd080);border-radius:50%;box-shadow:0 0 30px rgba(255,208,128,.4),0 0 60px rgba(255,208,128,.15); }
.illus-moon .star { position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.6; }
.illus-moon .star:nth-child(1){top:15%;left:20%} .illus-moon .star:nth-child(2){top:25%;left:55%}
.illus-moon .star:nth-child(3){top:10%;left:70%} .illus-moon .star:nth-child(4){top:35%;left:35%}
.illus-moon .star:nth-child(5){top:20%;left:80%} .illus-moon .star:nth-child(6){top:40%;left:15%}
.illus-moon .house { position:absolute;bottom:0;left:15%;width:40px;height:25px;background:#3a3028;border-radius:2px;opacity:.7; }
.illus-moon .house::after { content:'';position:absolute;top:-15px;left:0;width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-bottom:15px solid #4a3a2a; }
.illus-moon .tree { position:absolute;bottom:0;right:20%;width:8px;height:40px;background:#2a1a0a;opacity:.6;border-radius:4px 4px 0 0; }

/* Flower scene (春天/花) */
.illus-flower { background:linear-gradient(180deg,#f8e8e0 0%,#e8d4c8 50%,#d8c8b0 100%); }
.illus-flower .branch { position:absolute;bottom:30px;left:20%;width:150px;height:6px;background:#6a4a3a;border-radius:3px;transform:rotate(-5deg); }
.illus-flower .branch::after { content:'';position:absolute;top:-30px;left:60px;width:4px;height:35px;background:#6a4a3a;border-radius:2px;transform:rotate(20deg); }
.illus-flower .petal { position:absolute;width:14px;height:14px;background:radial-gradient(circle,#ffa0b0,#e06080);border-radius:50% 50% 50% 0;opacity:.85; }
.illus-flower .petal:nth-child(1){top:60px;left:40%}  .illus-flower .petal:nth-child(2){top:55px;left:45%;transform:rotate(60deg)}
.illus-flower .petal:nth-child(3){top:58px;left:50%;transform:rotate(120deg)} .illus-flower .petal:nth-child(4){top:62px;left:46%;transform:rotate(180deg)}
.illus-flower .petal:nth-child(5){top:64px;left:42%;transform:rotate(240deg)} .illus-flower .petal:nth-child(6){top:40px;left:30%;transform:rotate(30deg)}
.illus-flower .petal:nth-child(7){top:38px;left:55%} .illus-flower .petal:nth-child(8){top:45px;left:60%;transform:rotate(90deg)}

/* Bamboo scene (品格/竹) */
.illus-bamboo { background:linear-gradient(180deg,#dce8d8 0%,#c8d8c0 50%,#b8c0a8 100%); }
.illus-bamboo .bam { position:absolute;bottom:0;width:6px;border-radius:3px;background:linear-gradient(180deg,transparent 5%,#5a8a4a 6%,#5a8a4a 14%,transparent 15%,#5a8a4a 16%,#5a8a4a 100%); }
.illus-bamboo .bam:nth-child(1){left:25%;height:140px;transform:rotate(2deg);}
.illus-bamboo .bam:nth-child(2){left:35%;height:155px;transform:rotate(-1deg);}
.illus-bamboo .bam:nth-child(3){left:45%;height:130px;transform:rotate(3deg);}
.illus-bamboo .bam:nth-child(4){left:55%;height:145px;transform:rotate(-2deg);}
.illus-bamboo .b-leaf { position:absolute;width:24px;height:8px;background:#6a9a5a;border-radius:0 50% 50% 0;opacity:.7; }
.illus-bamboo .b-leaf:nth-child(5){top:30px;left:40%;transform:rotate(-20deg);}
.illus-bamboo .b-leaf:nth-child(6){top:40px;left:52%;transform:rotate(15deg);}

/* Default scene (通用山水) */
.illus-default { background:linear-gradient(180deg,#e0dcc8 0%,#d8d4c0 40%,#c8c4b0 100%); }
.illus-default .sun { position:absolute;top:20px;right:30px;width:50px;height:50px;background:radial-gradient(circle,#ffe8a0,#f0c860);border-radius:50%;opacity:.7; }
.illus-default .bird { position:absolute;top:20px;left:30%;font-size:14px;color:#5a5a4a;animation:birdFly 4s ease-in-out infinite; }
@keyframes birdFly { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ========== Card body ========== */
.card-body { padding:24px 28px 0; }
.card-title {
  font-family:"ZCOOL KuaiLe","Ma Shan Zheng",cursive;
  font-size:24px;color:var(--ink);margin-bottom:4px;letter-spacing:2px;
}
.card-author { font-size:13px;color:var(--ink-muted);margin-bottom:12px;letter-spacing:1px; }
.card-excerpt {
  font-size:14px;color:var(--ink-soft);line-height:1.9;letter-spacing:.5px;margin-bottom:16px;
  text-align:justify;
}
.card-tags { display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px dashed rgba(201,168,76,.2); }
.card-tag {
  font-size:12px;color:var(--ink-muted);background:rgba(201,168,76,.06);
  border:1px solid rgba(201,168,76,.12);padding:2px 10px;border-radius:2px;letter-spacing:1px;
}

/* ========== Footer ========== */
.footer { text-align:center;padding:40px 24px 60px;position:relative;z-index:1; }
.footer .waves { display:flex;justify-content:center;gap:4px;margin-bottom:20px; }
.footer .waves i{display:block;width:3px;background:var(--gold);border-radius:2px;animation:wv 1.2s ease-in-out infinite;}
.footer .waves i:nth-child(1){height:10px;animation-delay:0s} .footer .waves i:nth-child(2){height:18px;animation-delay:.1s}
.footer .waves i:nth-child(3){height:14px;animation-delay:.2s} .footer .waves i:nth-child(4){height:22px;animation-delay:.3s}
.footer .waves i:nth-child(5){height:14px;animation-delay:.4s} .footer .waves i:nth-child(6){height:10px;animation-delay:.5s}
@keyframes wv{0%,100%{transform:scaleY(1);opacity:.4}50%{transform:scaleY(.3);opacity:1}}
.footer p { font-size:13px;color:var(--ink-muted);letter-spacing:2px;line-height:2; }

/* ========== Responsive ========== */
@media(max-width:768px){
  .hero{padding:48px 0 36px}.hero h1{font-size:34px}
  .gallery{grid-template-columns:1fr;gap:18px}
  .card-illus{height:140px}.card-body{padding:18px 20px 0}
}

.illus-stamp {
  position:absolute;top:14px;right:14px;
  font-family:"Ma Shan Zheng","Noto Serif SC",cursive;
  font-size:22px;color:var(--red);opacity:.7;
  line-height:1;
}
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud">☁️</div><div class="cloud">☁️</div><div class="cloud">☁️</div><div class="cloud">☁️</div><div class="cloud">☁️</div>
</div>

<div class="container">
  <div class="hero">
    <h1>森哥的古诗绘本馆</h1>
    <p class="subtitle">为奥莉和茉莉 · 挑选最美的诗</p>
    <div class="deco"><span></span><div class="dia"></div><span></span></div>
  </div>

  <div class="sect-head">绘本目录</div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    <div class="waves"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <p>打开绘本 · 听见诗的声音</p>
  </div>
</div>

<script>
// CSS illustration templates by tag
const ILLUS = {
  mountain: `<div class="card-illus illus-mountain"><div class="peak-l"></div><div class="peak-c"></div><div class="peak-r"></div><div class="mist"></div><div class="boat">⛵</div></div>`,
  moon: `<div class="card-illus illus-moon"><div class="moon"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="house"></div><div class="tree"></div></div>`,
  flower: `<div class="card-illus illus-flower"><div class="branch"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>`,
  bamboo: `<div class="card-illus illus-bamboo"><div class="bam"></div><div class="bam"></div><div class="bam"></div><div class="bam"></div><div class="b-leaf"></div><div class="b-leaf"></div></div>`,
  default: `<div class="card-illus illus-default"><div class="sun"></div><div class="bird">⛅</div></div>`
};

function pickIllus(tags) {
  const t = tags.join(' ');
  if (/山|水|江|河|天门|庐山|瀑布/.test(t)) return ILLUS.mountain;
  if (/月|思乡|夜|故/.test(t)) return ILLUS.moon;
  if (/花|春|梅|桃|柳/.test(t)) return ILLUS.flower;
  if (/竹|松|品格|石/.test(t)) return ILLUS.bamboo;
  return ILLUS.default;
}

function pickStamp(author) {
  const map = { '唐':'唐','宋':'宋','元':'元','明':'明','清':'清' };
  for (const [k,v] of Object.entries(map)) if (author.includes(k)) return `<span class="illus-stamp">${v}</span>`;
  return '<span class="illus-stamp">詩</span>';
}

fetch('poems.json?' + Date.now())
  .then(r => r.json())
  .then(poems => {
    const gallery = document.getElementById('gallery');
    poems.forEach(poem => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = poem.file;
      card.target = '_blank';
      card.innerHTML =
        pickIllus(poem.tags) +
        pickStamp(poem.author) +
        '<div class="card-body">' +
          '<div class="card-title">' + poem.title + '</div>' +
          '<div class="card-author">' + poem.author + '</div>' +
          '<div class="card-excerpt">' + poem.summary + '</div>' +
          '<div class="card-tags">' + poem.tags.map(t => '<span class="card-tag">#' + t + '</span>').join('') + '</div>' +
        '</div>';
      gallery.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('gallery').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;color:var(--ink-muted);padding:40px;">📜 古诗正在赶来…</div>';
  });
</script>
</body>
</html>
